[functions]
  directory = "netlify/functions"

[functions."research-content-generate"]
  # Research runs Brave + source fetches + OpenAI; allow longer than default.
  timeout = 60

[functions."cruise-line-audit"]
  # Fleet audit: Brave + page fetch + optional LLM name extract.
  timeout = 60

[functions."cruise-discovery"]
  # Discovery: Brave + official page fetch per cruise line.
  timeout = 60

[functions."cruise-discovery-cron"]
  # Weekly: expire sailed cruises, then kick full discovery wave.
  schedule = "0 6 * * 1"
  timeout = 60

[functions."cruise-discovery-wave-background"]
  # Background wave: loops all cruise lines (Netlify background ~15 min).


