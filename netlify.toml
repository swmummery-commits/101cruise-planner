[functions]
  directory = "netlify/functions"

[functions."research-content-generate"]
  # Research runs Brave + source fetches + OpenAI; allow longer than default.
  timeout = 60

[functions."cruise-line-audit"]
  # Fleet audit: Brave + page fetch + optional LLM name extract.
  timeout = 60

[functions."cruise-discovery"]
  # Discovery: Brave + official page fetch per cruise line.
  timeout = 60

[functions."cruise-discovery-cron"]
  # Weekly: expire sailed cruises, then kick full discovery wave.
  schedule = "0 6 * * 1"
  timeout = 60

[functions."cruise-discovery-wave-background"]
  # Background wave: loops all cruise lines (Netlify background ~15 min).

[functions."bulk-ship-images"]
  # ZIP download + hash + storage writes for ship image import.
  timeout = 60

[functions."route-map-generate"]
  # Route Object load/create + SVG + PNG rasterisation.
  # Prefer native @resvg/resvg-js; fall back to @resvg/resvg-wasm when the Linux
  # platform binary is missing from the Function bundle.
  timeout = 60
  external_node_modules = [
    "@resvg/resvg-js",
    "@resvg/resvg-js-linux-x64-gnu",
    "@resvg/resvg-wasm"
  ]
  included_files = [
    "node_modules/@resvg/resvg-js/**",
    "node_modules/@resvg/resvg-js-linux-x64-gnu/**",
    "node_modules/@resvg/resvg-wasm/**",
    "netlify/functions/fonts/**"
  ]


