<!--
  101cruise My Cruise — Squarespace Code Block

  Replace the existing fixed-height iframe with this block.
  The planner posts its content height; this script resizes the iframe
  so Squarespace white space does not show below the dashboard.
-->
<style>
  #101cruise-my-cruise-wrap {
    width: 100%;
    margin: 0;
    padding: 0;
    line-height: 0;
  }
  #101cruise-my-cruise {
    width: 100%;
    border: 0;
    display: block;
    min-height: 480px;
    background: transparent;
  }
</style>
<div id="101cruise-my-cruise-wrap">
  <iframe
    id="101cruise-my-cruise"
    title="My Cruise"
    src="https://admirable-tiramisu-d4da8a.netlify.app/index.html"
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
    allow="clipboard-write"
  ></iframe>
</div>
<script>
  (function () {
    var iframe = document.getElementById("101cruise-my-cruise");
    if (!iframe) return;

    function applyHeight(height) {
      var next = Math.max(Number(height) || 0, 320);
      iframe.style.height = next + "px";
    }

    window.addEventListener("message", function (event) {
      var data = event && event.data;
      if (!data || data.type !== "101cruise-my-cruise-height") return;
      // Only accept messages from the Netlify planner origin.
      if (event.origin && event.origin.indexOf("admirable-tiramisu-d4da8a.netlify.app") === -1) return;
      applyHeight(data.height);
    });
  })();
</script>
