<style>

    id="101cruise-my-cruise"

    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
    allow="clipboard-write"
  ></iframe>
</div>
<script>
  (function () {
    var iframe = document.getElementById("101cruise-my-cruise");
    if (!iframe) return;
    var originNeedle = "admirable-tiramisu-d4da8a.netlify.app";

    function applyHeight(height) {
      var next = Math.max(Number(height) || 0, 360);
      // Ignore wild values from a bad measure / feedback loop.
      if (next > 12000) return;
      iframe.style.height = next + "px";
    }

    window.addEventListener("message", function (event) {
      var data = event && event.data;
      if (!data || data.type !== "101cruise-my-cruise-height") return;
      if (event.origin && String(event.origin).indexOf(originNeedle) === -1) return;
      applyHeight(data.height);
    });
  })();
</script>
