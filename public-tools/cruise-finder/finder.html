<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cruise Finder | 101cruise</title>
  <style>
    body {
      margin: 0;
      padding: 28px 16px 64px;
      background: #fff;
      color: #111;
      font-family: "Halyard Display", Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="101cruise-cruise-finder" data-cf-finder>
    <p style="max-width:760px;margin:0 auto;color:#666;">Loading holiday planner…</p>
  </div>
  <script>
    (function () {
      var path = location.pathname || "/";
      var base = /\/cruise-finder\/?$/.test(path)
        ? "/public-tools/cruise-finder/"
        : (path.replace(/[^/]*$/, "") || "./");

      function fail(msg) {
        var mount = document.getElementById("101cruise-cruise-finder");
        if (mount) {
          mount.innerHTML =
            '<p style="max-width:760px;margin:0 auto;color:#8a2f2f;">' + msg + "</p>";
        }
      }

      function loadScript(src, next) {
        var el = document.createElement("script");
        el.src = src;
        el.onload = next;
        el.onerror = function () {
          fail("Could not load " + src);
        };
        document.body.appendChild(el);
      }

      var css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = base + "finder.css";
      document.head.appendChild(css);

      loadScript(base + "destinations.js", function () {
        loadScript(base + "approved-cruise-lines.js", function () {
          loadScript(base + "destination-images.js", function () {
            loadScript(base + "hero-images.js", function () {
              loadScript(base + "finder.js", function () {});
            });
          });
        });
      });
    })();
  </script>
</body>
</html>
