<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cruise Finder | 101cruise</title>
  <style>
    body {
      margin: 0;
      padding: 28px 16px 64px;
      background: #fff;
      color: #111;
      font-family: "Halyard Display", Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="101cruise-cruise-finder" data-cf-finder>
    <p style="max-width:760px;margin:0 auto;color:#666;">Loading holiday planner…</p>
  </div>
  <script>
    (function () {
      var path = location.pathname || "/";
      var base = /\/cruise-finder\/?$/.test(path)
        ? "/public-tools/cruise-finder/"
        : (path.replace(/[^/]*$/, "") || "./");
      var css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = base + "finder.css";
      document.head.appendChild(css);
      var destinations = document.createElement("script");
      destinations.src = base + "destinations.js";
      destinations.onload = function () {
        var heroes = document.createElement("script");
        heroes.src = base + "hero-images.js";
        heroes.onload = function () {
          var app = document.createElement("script");
          app.src = base + "finder.js";
          app.onerror = function () {
            var mount = document.getElementById("101cruise-cruise-finder");
            if (mount) {
              mount.innerHTML =
                '<p style="max-width:760px;margin:0 auto;color:#8a2f2f;">Could not load finder.js from ' +
                app.src +
                ".</p>";
            }
          };
          document.body.appendChild(app);
        };
        heroes.onerror = function () {
          var mount = document.getElementById("101cruise-cruise-finder");
          if (mount) {
            mount.innerHTML =
              '<p style="max-width:760px;margin:0 auto;color:#8a2f2f;">Could not load hero-images.js.</p>';
          }
        };
        document.body.appendChild(heroes);
      };
      destinations.onerror = function () {
        var mount = document.getElementById("101cruise-cruise-finder");
        if (mount) {
          mount.innerHTML =
            '<p style="max-width:760px;margin:0 auto;color:#8a2f2f;">Could not load destinations.js.</p>';
        }
      };
      document.body.appendChild(destinations);
    })();
  </script>
</body>
</html>
