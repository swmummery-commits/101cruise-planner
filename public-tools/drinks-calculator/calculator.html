<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drinks Calculator | 101cruise</title>
  <style>
    body {
      margin: 0;
      padding: 28px 16px 64px;
      background: #fff;
      color: #1f2a28;
      font-family: "Halyard Display", "Avenir Next", "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <div id="101cruise-drinks-calculator" data-dc-calculator>
    <p style="max-width:960px;margin:0 auto;color:#5f6d69;">Loading calculator…</p>
  </div>
  <script>
    (function () {
      var base = (location.pathname || "/").replace(/[^/]*$/, "") || "./";
      var css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = base + "calculator.css";
      document.head.appendChild(css);
      var s = document.createElement("script");
      s.src = base + "calculator.js";
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
